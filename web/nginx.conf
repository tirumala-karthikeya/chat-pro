server {
    listen 80;
    server_name agentics.xpectrum-ai.com www.agentics.xpectrum-ai.com;

    root /var/www/html;
    index index.html;

    # Handle React routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Enable GZIP compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# Redirect HTTP to HTTPS (when you set up SSL)
server {
    listen 80;
    server_name 35.164.58.94;
    return 301 https://agentics.xpectrum-ai.com$request_uri;
} 